site_name: ggplot2_py
site_description: Python port of R's ggplot2 package
theme:
  name: material
  palette:
    primary: indigo
    accent: indigo

nav:
  - Home: index.md
  - API Reference: api.md
  - Tutorials:
    - Getting Started: tutorials/ggplot2.ipynb

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [.]

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences
